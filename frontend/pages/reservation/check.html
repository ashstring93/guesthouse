<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>물레방아하우스 예약 확인</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/images/apple-touch-icon.png">
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="../../css/responsive.css">
    <link rel="stylesheet" href="../../css/reservation-hub.css">
    <link rel="stylesheet" href="../../css/chatbot.css">
</head>

<body class="reservation-hub-page">
    <main class="reservation-hub-main">
        <div class="reservation-hub-shell">
            <header class="reservation-hub-top">
                <a href="../../" class="back-link" aria-label="메인으로 돌아가기">← 메인으로</a>
                <h1>예약 센터</h1>
                <p>예약자 이름과 연락처로 예약 상태를 확인할 수 있습니다.</p>
            </header>

            <nav class="reservation-hub-tabs" aria-label="예약 메뉴">
                <a href="../book/" class="reservation-hub-tab">객실 예약</a>
                <a href="../list/" class="reservation-hub-tab">예약 현황</a>
                <a href="../check/" class="reservation-hub-tab active" aria-current="page">예약 확인</a>
            </nav>

            <section class="reservation-panel">
                <h2>예약 정보 조회</h2>
                <p>예약자 이름과 연락처를 입력해 주세요.</p>

                <form id="reservation-check-form" novalidate>
                    <div class="reservation-check-grid">
                        <label class="field" for="check-customer-name">
                            <span>예약자 이름 <em>*</em></span>
                            <input type="text" id="check-customer-name" name="customer_name" placeholder="예: 홍길동"
                                required>
                        </label>
                        <label class="field" for="check-customer-phone">
                            <span>예약자 연락처 <em>*</em></span>
                            <input type="tel" id="check-customer-phone" name="customer_phone"
                                placeholder="010-0000-0000" required>
                        </label>
                    </div>
                    <div class="reservation-check-actions">
                        <button type="submit" class="reservation-check-btn">예약 조회하기</button>
                    </div>
                </form>

                <p id="reservation-check-message" class="reservation-check-message" aria-live="polite"></p>

                <div id="reservation-check-result" class="reservation-check-result" hidden>
                    <div class="reservation-check-row">
                        <span class="label">예약 상태</span>
                        <span id="check-status" class="value">-</span>
                    </div>
                    <div class="reservation-check-row">
                        <span class="label">숙박 일정</span>
                        <span id="check-schedule" class="value">-</span>
                    </div>
                    <div class="reservation-check-row">
                        <span class="label">인원</span>
                        <span id="check-guests" class="value">-</span>
                    </div>
                    <div class="reservation-check-row">
                        <span class="label">결제 금액</span>
                        <span id="check-amount" class="value">-</span>
                    </div>
                    <div class="reservation-check-row">
                        <span class="label">바베큐 이용</span>
                        <span id="check-bbq" class="value">-</span>
                    </div>
                    <div class="reservation-check-row">
                        <span class="label">반려동물 동반</span>
                        <span id="check-pet" class="value">-</span>
                    </div>

                    <div class="reservation-check-row">
                        <span class="label">접수 시각</span>
                        <span id="check-created-at" class="value">-</span>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <script src="../../js/reservation-check.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="../../js/chatbot.js"></script>
</body>

</html>
