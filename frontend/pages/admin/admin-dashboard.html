<!DOCTYPE html>
<html lang="ko">

<head>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/images/apple-touch-icon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 대시보드 - 물레방아하우스</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
            background: #f5f6fa;
            color: #1a1a2e;
        }

        .header {
            background: #1a1a2e;
            color: #fff;
            padding: 20px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 700;
        }

        .header a {
            color: #a0aec0;
            text-decoration: none;
            font-size: 14px;
        }

        .container {
            max-width: 1200px;
            margin: 24px auto;
            padding: 0 16px;
        }

        /* 인증 폼 */
        .auth-box {
            background: #fff;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            max-width: 400px;
            margin: 80px auto;
            text-align: center;
        }

        .auth-box h2 {
            margin-bottom: 16px;
            font-size: 18px;
        }

        .auth-box input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 15px;
            margin-bottom: 12px;
        }

        .auth-box button {
            width: 100%;
            padding: 12px;
            background: #3182f6;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }

        .auth-box button:hover {
            background: #1b6cf2;
        }

        .auth-error {
            color: #dc2626;
            font-size: 13px;
            margin-top: 8px;
        }

        /* 통계 카드 */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 1px 6px rgba(0, 0, 0, 0.04);
        }

        .stat-card .label {
            font-size: 13px;
            color: #666;
            margin-bottom: 4px;
        }

        .stat-card .value {
            font-size: 24px;
            font-weight: 700;
        }

        /* 테이블 */
        .table-wrap {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 1px 6px rgba(0, 0, 0, 0.04);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th {
            background: #f8fafc;
            padding: 12px 14px;
            text-align: left;
            font-weight: 600;
            color: #475569;
            border-bottom: 2px solid #e2e8f0;
            white-space: nowrap;
        }

        td {
            padding: 12px 14px;
            border-bottom: 1px solid #f1f5f9;
            vertical-align: middle;
        }

        tr:hover {
            background: #f8fafc;
        }

        /* 상태 뱃지 */
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge.paid {
            background: #dcfce7;
            color: #166534;
        }

        .badge.pending {
            background: #fef3c7;
            color: #92400e;
        }

        .badge.cancelled {
            background: #fee2e2;
            color: #991b1b;
        }

        .badge.mock_paid {
            background: #e0e7ff;
            color: #3730a3;
        }

        .badge.confirming {
            background: #dbeafe;
            color: #1d4ed8;
        }

        .badge.failed {
            background: #fee2e2;
            color: #b91c1c;
        }

        /* 환불 정보 */
        .refund-info {
            font-size: 12px;
            line-height: 1.5;
        }

        .refund-full {
            color: #059669;
            font-weight: 600;
        }

        .refund-half {
            color: #d97706;
            font-weight: 600;
        }

        .refund-none {
            color: #dc2626;
            font-weight: 600;
        }

        /* 취소 버튼 */
        .btn-cancel {
            padding: 6px 14px;
            background: #ef4444;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-cancel:hover {
            background: #dc2626;
        }

        .btn-cancel:disabled {
            background: #d1d5db;
            cursor: not-allowed;
        }

        /* 모달 */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: #fff;
            border-radius: 16px;
            padding: 32px;
            max-width: 420px;
            width: 90%;
        }

        .modal h3 {
            margin-bottom: 12px;
            font-size: 18px;
        }

        .modal p {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 16px;
        }

        .modal .amount-highlight {
            font-size: 20px;
            font-weight: 700;
            color: #ef4444;
            margin: 12px 0;
        }

        .modal textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 13px;
            resize: vertical;
            min-height: 60px;
            margin-bottom: 12px;
        }

        .modal-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        .modal-actions button {
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
        }

        .btn-confirm-cancel {
            background: #ef4444;
            color: #fff;
        }

        .btn-close-modal {
            background: #f1f5f9;
            color: #475569;
        }

        .dashboard-stack {
            display: grid;
            gap: 24px;
        }

        .section-card {
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 1px 6px rgba(0, 0, 0, 0.04);
        }

        .section-head {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 16px;
        }

        .section-head h2 {
            font-size: 18px;
            margin-bottom: 6px;
        }

        .section-head p {
            color: #64748b;
            font-size: 13px;
            line-height: 1.5;
        }

        .date-block-form {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 180px)) minmax(220px, 1fr) auto;
            gap: 12px;
            align-items: end;
            margin-bottom: 12px;
        }

        .form-field {
            display: grid;
            gap: 6px;
        }

        .form-field span {
            color: #64748b;
            font-size: 12px;
            font-weight: 600;
        }

        .form-field input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
        }

        .btn-primary-action {
            padding: 11px 16px;
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }

        .btn-primary-action:hover {
            background: #1d4ed8;
        }

        .btn-primary-action:disabled {
            background: #93c5fd;
            cursor: wait;
        }

        .section-message {
            min-height: 20px;
            margin-bottom: 10px;
            color: #64748b;
            font-size: 13px;
        }

        .section-message.error {
            color: #dc2626;
        }

        .section-message.success {
            color: #059669;
        }

        .date-range-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 999px;
            background: #eff6ff;
            color: #1d4ed8;
            font-size: 12px;
            font-weight: 700;
        }

        .date-block-reason {
            color: #475569;
        }

        .btn-delete-date {
            padding: 6px 12px;
            background: #fff;
            color: #dc2626;
            border: 1px solid #fecaca;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-delete-date:hover {
            background: #fef2f2;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }

        @media (max-width: 860px) {
            .date-block-form {
                grid-template-columns: 1fr;
            }

            .section-head {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>🏠 물레방아하우스 관리자</h1>
        <a href="/">← 홈으로</a>
    </div>

    <!-- 인증 -->
    <div id="auth-section" class="auth-box">
        <h2>🔐 관리자 인증</h2>
        <input type="password" id="token-input" placeholder="관리자 토큰 입력" autofocus>
        <button onclick="authenticate()">로그인</button>
        <p id="auth-error" class="auth-error" hidden></p>
    </div>

    <!-- 대시보드 (인증 후 표시) -->
    <div id="dashboard-section" class="container" hidden>
        <div class="stats" id="stats-area"></div>
        <div class="dashboard-stack">
            <section class="section-card">
                <div class="section-head">
                    <div>
                        <h2>예약 차단 일정</h2>
                        <p>관리자가 직접 막아 둔 날짜는 예약 달력과 결제 준비 단계에서 모두 예약 불가로 처리됩니다.</p>
                    </div>
                </div>
                <form id="date-block-form" class="date-block-form">
                    <label class="form-field" for="block-start-date">
                        <span>시작일</span>
                        <input type="date" id="block-start-date" required>
                    </label>
                    <label class="form-field" for="block-end-date">
                        <span>종료일</span>
                        <input type="date" id="block-end-date">
                    </label>
                    <label class="form-field" for="block-reason">
                        <span>사유</span>
                        <input type="text" id="block-reason" placeholder="예: 내부 점검, 개인 사용">
                    </label>
                    <button type="submit" id="date-block-submit" class="btn-primary-action">날짜 막기</button>
                </form>
                <p id="date-block-message" class="section-message" aria-live="polite"></p>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>차단 기간</th>
                                <th>일수</th>
                                <th>사유</th>
                                <th>등록 시각</th>
                                <th>관리</th>
                            </tr>
                        </thead>
                        <tbody id="blocked-date-body">
                            <tr>
                                <td colspan="5" class="loading">로딩 중...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>

            <section class="section-card">
                <div class="section-head">
                    <div>
                        <h2>예약 내역</h2>
                        <p>결제 상태와 환불 가능 여부를 함께 확인할 수 있습니다.</p>
                    </div>
                </div>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>주문번호</th>
                                <th>예약자</th>
                                <th>연락처</th>
                                <th>체크인</th>
                                <th>숙박</th>
                                <th>인원</th>
                                <th>결제금액</th>
                                <th>상태</th>
                                <th>환불 정보</th>
                                <th>관리</th>
                            </tr>
                        </thead>
                        <tbody id="reservation-body">
                            <tr>
                                <td colspan="10" class="loading">로딩 중...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </div>
    </div>

    <!-- 취소 확인 모달 -->
    <div id="cancel-modal" class="modal-overlay">
        <div class="modal">
            <h3>⚠️ 결제 취소 확인</h3>
            <p id="cancel-modal-info"></p>
            <div id="cancel-modal-amount" class="amount-highlight"></div>
            <textarea id="cancel-reason" placeholder="취소 사유 (선택)">고객 요청에 의한 취소</textarea>
            <div class="modal-actions">
                <button class="btn-close-modal" onclick="closeModal()">닫기</button>
                <button class="btn-confirm-cancel" id="btn-confirm" onclick="confirmCancel()">취소 진행</button>
            </div>
        </div>
    </div>

    <script>
        let adminToken = '';
        let currentOrderId = '';

        function getAppBasePath() {
            const path = window.location.pathname;
            const adminMarker = '/admin/dashboard';
            const markerIndex = path.indexOf(adminMarker);

            if (markerIndex >= 0) {
                return path.slice(0, markerIndex);
            }

            if (path === '/' || path === '') {
                return '';
            }

            return path.endsWith('/') ? path.slice(0, -1) : path;
        }

        // API 기본 URL (서브패스 배포 시 /guesthouse prefix 포함)
        const baseUrl = `${window.location.origin}${getAppBasePath()}`;

        // 인증
        document.getElementById('token-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') authenticate();
        });

        async function loadDashboardData() {
            const [reservationsRes, dateBlocksRes] = await Promise.all([
                fetch(`${baseUrl}/api/admin/reservations?token=${encodeURIComponent(adminToken)}`),
                fetch(`${baseUrl}/api/admin/date-blocks?token=${encodeURIComponent(adminToken)}`),
            ]);

            if (!reservationsRes.ok) {
                throw new Error('예약 목록을 불러오지 못했습니다.');
            }
            if (!dateBlocksRes.ok) {
                throw new Error('차단 일정을 불러오지 못했습니다.');
            }

            const reservationsData = await reservationsRes.json();
            const dateBlocksData = await dateBlocksRes.json();
            const dateBlocks = Array.isArray(dateBlocksData.date_blocks) ? dateBlocksData.date_blocks : [];

            renderDashboard(reservationsData.reservations || [], dateBlocks);
            renderDateBlocks(dateBlocks);
        }

        async function authenticate() {
            const token = document.getElementById('token-input').value.trim();
            if (!token) return;

            try {
                const res = await fetch(`${baseUrl}/api/admin/reservations?token=${encodeURIComponent(token)}`);
                if (res.status === 403) {
                    document.getElementById('auth-error').textContent = '토큰이 올바르지 않습니다.';
                    document.getElementById('auth-error').hidden = false;
                    return;
                }
                if (!res.ok) throw new Error('서버 오류');

                adminToken = token;
                document.getElementById('auth-error').hidden = true;
                document.getElementById('auth-section').hidden = true;
                document.getElementById('dashboard-section').hidden = false;
                await loadDashboardData();
            } catch (e) {
                document.getElementById('auth-error').textContent = '인증 실패: ' + e.message;
                document.getElementById('auth-error').hidden = false;
            }
        }

        function createEmptyStateRow(colspan, message) {
            const row = document.createElement('tr');
            const cell = document.createElement('td');
            cell.colSpan = colspan;
            cell.className = 'loading';
            cell.textContent = message;
            row.appendChild(cell);
            return row;
        }

        function createTextCell(value, options = {}) {
            const cell = document.createElement('td');
            const normalized = value === undefined || value === null || value === '' ? '-' : String(value);

            if (options.className) {
                cell.className = options.className;
            }
            if (options.style) {
                Object.assign(cell.style, options.style);
            }

            cell.textContent = normalized;
            return cell;
        }

        function formatCurrency(value) {
            return `${Number(value || 0).toLocaleString()}원`;
        }

        function shortOrderId(id) {
            if (!id) return '-';
            return id.length > 16 ? id.slice(0, 8) + '…' + id.slice(-4) : id;
        }

        function createStatusBadge(status) {
            const normalized = String(status || '').toLowerCase();
            const badge = document.createElement('span');
            const labels = {
                paid: '결제완료',
                pending: '대기',
                cancelled: '취소',
                mock_paid: '테스트결제',
                confirming: '승인중',
                failed: '실패',
            };

            badge.className = 'badge';
            if (normalized) {
                badge.classList.add(normalized);
            }
            badge.textContent = labels[normalized] || normalized || '알수없음';
            return badge;
        }

        function createRefundNode(status, refund) {
            const normalized = String(status || '').toLowerCase();
            if (normalized !== 'paid') {
                const placeholder = document.createElement('span');
                placeholder.style.color = '#999';
                placeholder.style.fontSize = '12px';
                placeholder.textContent = '-';
                return placeholder;
            }

            const refundRate = Number(refund.refund_rate || 0);
            const refundAmount = Number(refund.refund_amount || 0);
            const wrapper = document.createElement('div');
            const rateLine = document.createElement('span');
            const messageLine = document.createElement('span');
            const tone = refundRate === 100 ? 'refund-full' : refundRate === 50 ? 'refund-half' : 'refund-none';

            wrapper.className = 'refund-info';
            rateLine.className = tone;
            rateLine.textContent = `${refundRate}% (${formatCurrency(refundAmount)})`;
            messageLine.style.color = '#888';
            messageLine.textContent = refund.message || '';

            wrapper.appendChild(rateLine);
            wrapper.appendChild(document.createElement('br'));
            wrapper.appendChild(messageLine);
            return wrapper;
        }

        // 대시보드 렌더링
        function renderDashboard(reservations, dateBlocks = []) {
            const total = reservations.length;
            const paid = reservations.filter(r => r.status === 'paid').length;
            const cancelled = reservations.filter(r => r.status === 'cancelled').length;
            const blockedRanges = dateBlocks.length;
            const totalRevenue = reservations
                .filter(r => r.status === 'paid')
                .reduce((sum, r) => sum + (r.total_amount || 0), 0);

            document.getElementById('stats-area').innerHTML = `
            <div class="stat-card"><div class="label">전체 예약</div><div class="value">${total}건</div></div>
            <div class="stat-card"><div class="label">결제 완료</div><div class="value" style="color:#059669">${paid}건</div></div>
            <div class="stat-card"><div class="label">취소</div><div class="value" style="color:#dc2626">${cancelled}건</div></div>
            <div class="stat-card"><div class="label">차단 일정</div><div class="value" style="color:#1d4ed8">${blockedRanges}건</div></div>
            <div class="stat-card"><div class="label">결제 총액</div><div class="value">${totalRevenue.toLocaleString()}원</div></div>
        `;

            const tbody = document.getElementById('reservation-body');
            tbody.replaceChildren();

            if (reservations.length === 0) {
                tbody.appendChild(createEmptyStateRow(10, '예약 내역이 없습니다.'));
                return;
            }

            reservations.forEach((reservation) => {
                const refund = reservation.refund_info || {};
                const canCancel = reservation.status === 'paid' && Number(refund.refund_rate || 0) > 0;
                const row = document.createElement('tr');

                row.appendChild(createTextCell(shortOrderId(reservation.order_id), {
                    style: { fontFamily: 'monospace', fontSize: '11px' },
                }));
                row.appendChild(createTextCell(reservation.customer_name || '-'));
                row.appendChild(createTextCell(reservation.customer_phone || '-'));
                row.appendChild(createTextCell(reservation.checkin_date || '-'));
                row.appendChild(createTextCell(`${reservation.nights || 1}박`));
                row.appendChild(createTextCell(`${reservation.adults || '-'}명`));
                row.appendChild(createTextCell(formatCurrency(reservation.total_amount), {
                    style: { fontWeight: '600' },
                }));

                const statusCell = document.createElement('td');
                statusCell.appendChild(createStatusBadge(reservation.status));
                row.appendChild(statusCell);

                const refundCell = document.createElement('td');
                refundCell.appendChild(createRefundNode(reservation.status, refund));
                row.appendChild(refundCell);

                const actionCell = document.createElement('td');
                if (canCancel) {
                    const cancelButton = document.createElement('button');
                    cancelButton.type = 'button';
                    cancelButton.className = 'btn-cancel';
                    cancelButton.textContent = '취소';
                    cancelButton.addEventListener('click', () => {
                        openCancelModal({
                            orderId: reservation.order_id,
                            name: reservation.customer_name || '-',
                            total: Number(reservation.total_amount || 0),
                            refundAmount: Number(refund.refund_amount || 0),
                            message: refund.message || '',
                        });
                    });
                    actionCell.appendChild(cancelButton);
                } else if (reservation.status === 'paid' && Number(refund.refund_rate || 0) === 0) {
                    actionCell.style.color = '#999';
                    actionCell.style.fontSize = '12px';
                    actionCell.textContent = '환불불가';
                } else {
                    actionCell.textContent = '-';
                }
                row.appendChild(actionCell);

                tbody.appendChild(row);
            });
        }

        function formatDateRange(startDate, endDate) {
            if (!startDate) return '-';
            if (!endDate || startDate === endDate) return startDate;
            return `${startDate} ~ ${endDate}`;
        }

        function getInclusiveDays(startDate, endDate) {
            if (!startDate || !endDate) return 1;
            const start = new Date(`${startDate}T00:00:00`);
            const end = new Date(`${endDate}T00:00:00`);
            if (Number.isNaN(start.getTime()) || Number.isNaN(end.getTime())) return 1;
            return Math.max(1, Math.round((end - start) / (1000 * 60 * 60 * 24)) + 1);
        }

        function formatDateTime(value) {
            if (!value) return '-';
            const parsed = new Date(String(value).replace(' ', 'T'));
            if (Number.isNaN(parsed.getTime())) return String(value);
            return new Intl.DateTimeFormat('ko-KR', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
            }).format(parsed);
        }

        function setDateBlockMessage(text, type = '') {
            const messageEl = document.getElementById('date-block-message');
            if (!messageEl) return;
            messageEl.textContent = text || '';
            messageEl.classList.remove('error', 'success');
            if (type) {
                messageEl.classList.add(type);
            }
        }

        function renderDateBlocks(dateBlocks) {
            const tbody = document.getElementById('blocked-date-body');
            if (!tbody) return;

            tbody.replaceChildren();

            if (!dateBlocks.length) {
                tbody.appendChild(createEmptyStateRow(5, '등록된 차단 일정이 없습니다.'));
                return;
            }

            dateBlocks.forEach((block) => {
                const row = document.createElement('tr');
                const rangeCell = document.createElement('td');
                const rangeBadge = document.createElement('span');
                const actionCell = document.createElement('td');
                const deleteButton = document.createElement('button');

                rangeBadge.className = 'date-range-badge';
                rangeBadge.textContent = formatDateRange(block.start_date, block.end_date);
                rangeCell.appendChild(rangeBadge);

                row.appendChild(rangeCell);
                row.appendChild(createTextCell(`${getInclusiveDays(block.start_date, block.end_date)}일`));
                row.appendChild(createTextCell(block.reason || '-', { className: 'date-block-reason' }));
                row.appendChild(createTextCell(formatDateTime(block.created_at)));

                deleteButton.type = 'button';
                deleteButton.className = 'btn-delete-date';
                deleteButton.textContent = '삭제';
                deleteButton.addEventListener('click', () => deleteDateBlock(block.id));
                actionCell.appendChild(deleteButton);
                row.appendChild(actionCell);

                tbody.appendChild(row);
            });
        }

        async function createDateBlock(event) {
            event.preventDefault();
            if (!adminToken) return;

            const startDateInput = document.getElementById('block-start-date');
            const endDateInput = document.getElementById('block-end-date');
            const reasonInput = document.getElementById('block-reason');
            const submitBtn = document.getElementById('date-block-submit');

            const startDate = startDateInput.value;
            const endDate = endDateInput.value || startDate;
            const reason = reasonInput.value.trim();

            if (!startDate) {
                setDateBlockMessage('차단 시작일을 선택해 주세요.', 'error');
                startDateInput.focus();
                return;
            }

            if (endDate < startDate) {
                setDateBlockMessage('종료일은 시작일 이후 또는 같은 날짜여야 합니다.', 'error');
                endDateInput.focus();
                return;
            }

            submitBtn.disabled = true;
            setDateBlockMessage('차단 일정을 저장하는 중입니다.');

            try {
                const res = await fetch(`${baseUrl}/api/admin/date-blocks?token=${encodeURIComponent(adminToken)}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        start_date: startDate,
                        end_date: endDate,
                        reason,
                    }),
                });
                const data = await res.json();

                if (!res.ok) {
                    throw new Error(data.detail || '차단 일정 저장에 실패했습니다.');
                }

                document.getElementById('date-block-form').reset();
                setDateBlockMessage('차단 일정을 저장했습니다.', 'success');
                await loadDashboardData();
            } catch (e) {
                setDateBlockMessage(e.message || '차단 일정 저장 중 오류가 발생했습니다.', 'error');
            } finally {
                submitBtn.disabled = false;
            }
        }

        async function deleteDateBlock(blockId) {
            if (!adminToken || !blockId) return;
            if (!confirm('이 차단 일정을 삭제하시겠습니까?')) return;

            setDateBlockMessage('차단 일정을 삭제하는 중입니다.');

            try {
                const res = await fetch(`${baseUrl}/api/admin/date-blocks/${blockId}?token=${encodeURIComponent(adminToken)}`, {
                    method: 'DELETE',
                });
                const data = await res.json();

                if (!res.ok) {
                    throw new Error(data.detail || '차단 일정 삭제에 실패했습니다.');
                }

                setDateBlockMessage('차단 일정을 삭제했습니다.', 'success');
                await loadDashboardData();
            } catch (e) {
                setDateBlockMessage(e.message || '차단 일정 삭제 중 오류가 발생했습니다.', 'error');
            }
        }

        // 취소 모달
        function openCancelModal({ orderId, name, total, refundAmount, message }) {
            currentOrderId = orderId;

            const infoEl = document.getElementById('cancel-modal-info');
            const nameEl = document.createElement('strong');
            nameEl.textContent = name || '-';

            infoEl.replaceChildren();
            infoEl.appendChild(nameEl);
            infoEl.appendChild(document.createTextNode(' 님의 예약을 취소합니다.'));
            infoEl.appendChild(document.createElement('br'));
            infoEl.appendChild(document.createTextNode(`결제 금액: ${formatCurrency(total)}`));
            if (message) {
                infoEl.appendChild(document.createElement('br'));
                infoEl.appendChild(document.createTextNode(String(message)));
            }

            document.getElementById('cancel-modal-amount').textContent = `환불 금액: ${formatCurrency(refundAmount)}`;
            document.getElementById('cancel-modal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('cancel-modal').classList.remove('show');
            currentOrderId = '';
        }

        async function confirmCancel() {
            if (!currentOrderId) return;
            const reason = document.getElementById('cancel-reason').value.trim() || '고객 요청에 의한 취소';
            const btn = document.getElementById('btn-confirm');
            btn.disabled = true;
            btn.textContent = '처리 중...';

            try {
                const res = await fetch(`${baseUrl}/api/admin/cancel-payment?token=${encodeURIComponent(adminToken)}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ order_id: currentOrderId, cancel_reason: reason }),
                });
                const data = await res.json();

                if (res.ok && data.success) {
                    alert(`✅ ${data.message}`);
                    closeModal();
                    await loadDashboardData();
                } else {
                    alert(`❌ 취소 실패: ${data.detail || data.message || '알 수 없는 오류'}`);
                }
            } catch (e) {
                alert(`❌ 네트워크 오류: ${e.message}`);
            } finally {
                btn.disabled = false;
                btn.textContent = '취소 진행';
            }
        }

        document.getElementById('date-block-form').addEventListener('submit', createDateBlock);
    </script>
</body>

</html>
